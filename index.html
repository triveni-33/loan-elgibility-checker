<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Eligibility Checker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 250vh;
            margin: 0;
        }
        .container {
            background-color: #fff;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin: 10px 0 5px;
        }
        input, select {
            margin-bottom: 15px;
            padding: 10px;
            width: 100%;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        button {
            padding: 10px;
            width: 100%;
            border: none;
            border-radius: 5px;
            background-color: #28a745;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Loan Eligibility Checker</h1>
        <form action="/predict" method="post">
            <label for="loan_id">Loan ID:</label>
            <input type="text" id="loan_id" name="loan_id" required>

            <label for="gender">Gender:</label>
            <select id="gender" name="gender" required>
                <option value="0">Male</option>
                <option value="1">Female</option>
            </select>

            <label for="married">Married:</label>
            <select id="married" name="married" required>
                <option value="0">No</option>
                <option value="1">Yes</option>
            </select>

            <label for="dependents">Dependents:</label>
            <select id="dependents" name="dependents" required>
                <option value="0">0</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3+</option>
            </select>

            <label for="education">Education:</label>
            <select id="education" name="education" required>
                <option value="0">Graduate</option>
                <option value="1">Not Graduate</option>
            </select>

            <label for="self_employed">Self Employed:</label>
            <select id="self_employed" name="self_employed" required>
                <option value="0">No</option>
                <option value="1">Yes</option>
            </select>

            <label for="applicant_income">Applicant Income:</label>
            <input type="number" id="applicant_income" name="applicant_income" required>

            <label for="coapplicant_income">Coapplicant Income:</label>
            <input type="number" id="coapplicant_income" name="coapplicant_income" required>

            <label for="loan_amount">Loan Amount:</label>
            <input type="number" id="loan_amount" name="loan_amount" required>

            <label for="loan_amount_term">Loan Amount Term:</label>
            <input type="number" id="loan_amount_term" name="loan_amount_term" required>

            <label for="credit_history">Credit History:</label>
            <select id="credit_history" name="credit_history" required>
                <option value="1">1</option>
                <option value="0">0</option>
            </select>

            <label for="property_area">Property Area:</label>
            <select id="property_area" name="property_area" required>
                <option value="0">Urban</option>
                <option value="1">Semiurban</option>
                <option value="2">Rural</option>
            </select>

            <button type="submit">Check Eligibility</button>
        </form>
    </div>
</body>
</html>
